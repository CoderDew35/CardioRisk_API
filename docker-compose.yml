version: "3.9"

services:
  # ─── RabbitMQ ────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: cardiorisk_rabbitmq
    hostname: cardiorisk_rabbit
    ports:
      - "5672:5672"      # AMQP protocol
      - "15672:15672"    # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cardiorisk_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cardiorisk
      POSTGRES_USER: cardiorisk_user
      POSTGRES_PASSWORD: cardiorisk_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardiorisk_user -d cardiorisk"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (Delta Lake / S3-compatible object store) ─────────
  minio:
    image: minio/minio:latest
    container_name: cardiorisk_minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MLflow Tracking Server ────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: cardiorisk_mlflow
    ports:
      - "5050:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: "postgresql://cardiorisk_user:cardiorisk_pass@postgres:5432/cardiorisk"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: "s3://cardiorisk/mlflow-artifacts"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
    command: mlflow server --host 0.0.0.0 --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── MinIO bucket initialiser (runs once) ────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: cardiorisk_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/cardiorisk;
      mc mb --ignore-existing local/cardiorisk/bronze;
      mc mb --ignore-existing local/cardiorisk/silver;
      mc mb --ignore-existing local/cardiorisk/gold;
      mc mb --ignore-existing local/cardiorisk/mlflow-artifacts;
      echo 'MinIO buckets ready.';
      "
    restart: on-failure

volumes:
  rabbitmq_data:
  postgres_data:
  minio_data:
